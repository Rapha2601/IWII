<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Estilo.css">
    <title>Tom&Jerry</title>
</head>
<body>
    <div class="container">
        <div class="main-cartoon">
            <div class="elemento-cartoon">
                <h1>Cadastro e Usuário</h1>
                <img src="img/tom.png" alt="Tom&Jerry" class="tom-cartoon">
            </div>

            <div class="form-cartoon">
                <input type="text" id="nome" placeholder="Insira o seu nome" class="box-cartoon">
                <input type="text" id="login" placeholder="Crie seu login" class="box-cartoon">
                <input type="text" id="senha" placeholder="Insira sua senha" class="box-cartoon">
                <input type="text" id="email" placeholder="Insira seu e-mail" class="box-cartoon">

                <div class="btn-button">
                    <button type="button" class="botao-cartoon">Cadastrar</button>
                    <button type="button" class="botao-cartoon">Sair</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
